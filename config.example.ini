[postgres]
host=localhost
port=5432
dbname=mi_base
user=mi_usuario
password=mi_password

[target]
schema=target_6_hechos
table=converge_esc_encuesta_satisf_cli

[target_defensa]
schema=proyecto_dashboard_defensa
table=converge_proyectos_financieros

[input]
# Carpeta de entrada de excels
input_dir=./
# Vacío = toma el último excel modificado
file_name=
# Hoja de excel a procesar
sheet_name=bbdd

[output]
output_dir=./salidas
# mapping.ini persistente (puede ser ruta absoluta o relativa al script)
mapping_file=mapping.ini
# Gestión del excel tras carga completa: none|move|rename
processed_mode=move
# Si processed_mode=move, carpeta destino
processed_dir=./excels_done
# Si processed_mode=rename, sufijo agregado al nombre
loaded_suffix=_LOADED

[run]
batch_size=1000
progress_every=10000
min_year=1900
max_year=2100
# Umbral de similitud (0-1) para mapear columnas excel -> tabla por texto
similarity_threshold=0.78

[fixed_values]
# Tokens especiales soportados:
# __now_ts__, __today__, __true__, __false__, __null__
fecha_carga=__now_ts__
fecha_creacion=__today__
fecha_ult_modificacion=__today__
creador=Massive Import
ult_modificador=Massive Import
deleted_row=__false__

[column_map]
# Opcional: mapeos manuales adicionales Excel -> columna destino
# operacion cdg=operacion_cdg
# id=id_externo
